name: Отклики на вакансии

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-22.04

    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости Python
        run: pip install -r requirements.txt

      - name: Кэш браузера Playwright
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Установить браузер Playwright (только если нет в кэше)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Установить системные зависимости (браузер из кэша)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: Отправить отклики
        env:
          HH_COOKIE: ${{ secrets.HH_COOKIE }}
          HH_PPC_RESUME_ID: ${{ secrets.HH_PPC_RESUME_ID }}
          HH_SEO_RESUME_ID: ${{ secrets.HH_SEO_RESUME_ID }}
        run: python pipeline_apply.py

      - name: Сохранить скриншот для отладки
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          if-no-files-found: ignore

      - name: Сохранить обновлённую базу данных
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobbot.db
          git diff --staged --quiet || git commit -m "chore: обновление статусов откликов [skip ci]"
          git push
