name: Test hh.ru API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Тест API
        env:
          HH_COOKIE: ${{ secrets.HH_COOKIE }}
        run: python test_hh_api.py
