name: Поднятие резюме на hh.ru

on:
  schedule:
    # Каждые 4 часа (UTC). В московском времени: 03:00, 07:00, 11:00, 15:00, 19:00, 23:00
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:  # Позволяет запустить вручную из интерфейса GitHub

jobs:
  refresh:
    runs-on: ubuntu-22.04

    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Установить браузер Playwright
        run: playwright install chromium --with-deps

      - name: Поднять резюме
        env:
          HH_COOKIE: ${{ secrets.HH_COOKIE }}
        run: python refresh_resume.py

      - name: Сохранить скриншот для отладки
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: login_page.png
          if-no-files-found: ignore
